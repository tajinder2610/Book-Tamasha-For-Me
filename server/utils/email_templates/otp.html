<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password OTP</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #eef2f7;
        font-family: Arial, sans-serif;
      }
      table {
        border-spacing: 0;
      }
      .wrapper {
        width: 100%;
        background-color: #eef2f7;
        padding: 18px 0;
      }
      .container {
        width: 100%;
        max-width: 620px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 14px;
        border: 1px solid #dfe8f6;
        overflow: hidden;
      }
      .hero {
        background: linear-gradient(90deg, #1f4e9b 0%, #3f7fe2 100%);
        color: #ffffff;
        text-align: center;
        padding: 20px 18px;
      }
      .hero h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.3;
      }
      .body {
        padding: 22px 24px 18px;
        color: #2a3850;
      }
      .body p {
        margin: 0 0 12px;
        line-height: 1.6;
        font-size: 15px;
      }
      .otp-box {
        margin: 8px 0 14px;
        border: 2px dashed #9db4de;
        border-radius: 10px;
        background-color: #f5f9ff;
        text-align: center;
        padding: 16px 10px;
      }
      .otp-code {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 6px;
        color: #163f86;
        line-height: 1;
      }
      .otp-note {
        margin-top: 8px;
        font-size: 13px;
        color: #6a7f9f;
      }
      .footer {
        padding: 0 24px 20px;
        font-size: 12px;
        color: #7b889e;
        line-height: 1.5;
      }

      @media only screen and (max-width: 620px) {
        .wrapper {
          padding: 10px 0;
        }
        .container {
          border-radius: 0;
          border-left: none;
          border-right: none;
        }
        .hero {
          padding: 18px 14px;
        }
        .hero h1 {
          font-size: 19px;
        }
        .body {
          padding: 18px 14px 12px;
        }
        .body p {
          font-size: 14px;
          margin-bottom: 10px;
        }
        .otp-box {
          padding: 14px 8px;
        }
        .otp-code {
          font-size: 29px;
          letter-spacing: 4px;
        }
        .footer {
          padding: 0 14px 16px;
        }
      }
    </style>
  </head>
  <body>
    <table role="presentation" class="wrapper" width="100%">
      <tr>
        <td align="center">
          <table role="presentation" class="container" width="100%">
            <tr>
              <td class="hero">
                <h1>Reset Password Verification</h1>
              </td>
            </tr>
            <tr>
              <td class="body">
                <p>Hi #{name},</p>
                <p>Your one-time password (OTP) to reset your account password is:</p>

                <div class="otp-box">
                  <div class="otp-code">#{otp}</div>
                  <div class="otp-note">Valid for 10 minutes</div>
                </div>

                <p>If you did not request this, you can safely ignore this email.</p>
              </td>
            </tr>
            <tr>
              <td class="footer">BookMyTamasha Security Team</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
