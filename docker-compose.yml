# old code:
# Docker Compose support is optional in this project. This file does not affect the current runtime setup unless Docker Compose is explicitly used.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      CLIENT_URL: http://localhost:8082
      DB_URL: mongodb://mongo:27017/bookmyshow
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: change-me
      RESEND_API_KEY: replace-me
      STRIPE_SECRET_KEY: replace-me
    depends_on:
      - mongo
      - redis
      - rabbitmq

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
